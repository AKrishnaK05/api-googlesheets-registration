<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #1a1a1a;
            --card: #2d2d2d;
            --text: #ffffff;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; margin-bottom: 2rem; color: var(--primary); }
        form { display: flex; flex-direction: column; gap: 1rem; }
        input, select, button {
            padding: 0.8rem;
            border-radius: 6px;
            border: 1px solid #444;
            background: #333;
            color: white;
            font-size: 1rem;
        }
        button {
            background: var(--primary);
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 6px;
            display: none;
        }
        .success { background: #2ecc71; display: block; }
        .error { background: #e74c3c; display: block; }
        table {
            width: 100%;
            margin-top: 2rem;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 0.8rem;
            border-bottom: 1px solid #444;
        }
        th { color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>User Registration</h1>
        <form id="registrationForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <select id="role" required>
                <option value="" disabled selected>Select Role</option>
                <option value="Admin">Admin</option>
                <option value="User">User</option>
                <option value="Editor">Editor</option>
            </select>
            <button type="submit">Register</button>
        </form>
        <div id="message" class="message"></div>
        
        <table id="userTable">
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Created At</th>
                </tr>
            </thead>
            <tbody id="userList"></tbody>
        </table>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        const messageDiv = document.getElementById('message');
        const userList = document.getElementById('userList');

        async function fetchUsers() {
            try {
                const response = await fetch('/users');
                const users = await response.json();
                userList.innerHTML = '';
                users.forEach(user => {
                    const row = `<tr>
                        <td>${user.email || 'N/A'}</td>
                        <td>${user.role || 'N/A'}</td>
                        <td>${user.created_at || 'N/A'}</td>
                    </tr>`;
                    userList.innerHTML += row;
                });
            } catch (err) {
                console.error('Failed to fetch users:', err);
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    messageDiv.textContent = result.message || 'Registration successful!';
                    messageDiv.className = 'message success';
                    form.reset();
                    fetchUsers();
                } else {
                    messageDiv.textContent = result.detail || 'Registration failed.';
                    messageDiv.className = 'message error';
                }
            } catch (err) {
                messageDiv.textContent = 'Network error.';
                messageDiv.className = 'message error';
            }
        });

        // Initial fetch
        fetchUsers();
    </script>
</body>
</html>
